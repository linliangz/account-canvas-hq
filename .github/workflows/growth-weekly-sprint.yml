name: Visioner weekly growth sprint

on:
  workflow_dispatch:
  schedule:
    - cron: "37 16 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  create-sprint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit the live website and shared product facts
        run: node scripts/audit-live-seo.mjs
      - name: Build the Search Console baseline
        env:
          GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON }}
          SEO_GSC_SITE_URL: sc-domain:visioner.cc
        run: node scripts/report-seo-geo-performance.mjs
      - name: Build the privacy-safe product acquisition baseline
        env:
          VISIONER_ADMIN_TOKEN: ${{ secrets.VISIONER_ADMIN_TOKEN }}
          VISIONER_APP_URL: https://app.visioner.cc
        run: node scripts/report-growth-performance.mjs
      - name: Generate channel-specific tracked links
        run: node scripts/generate-growth-links.mjs
      - name: Generate the founder content execution kit
        run: node scripts/generate-seo-geo-content-kit.mjs
      - name: Generate the weekly SEO and GEO operating brief
        run: node scripts/generate-seo-geo-weekly-brief.mjs
      - name: Create the weekly growth task
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          WEEK="$(date -u +%G-W%V)"
          TITLE="SEO/GEO growth sprint — ${WEEK}"
          EXISTING_ISSUE="$(gh issue list --repo "$GH_REPO" --state all --search "${TITLE} in:title" --json number,title --jq '.[] | select(.title == "'"$TITLE"'") | .number' | head -1)"
          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Weekly growth task already exists: #${EXISTING_ISSUE}"
            if [ -f artifacts/seo-geo-weekly-brief.md ]; then
              gh issue comment "$EXISTING_ISSUE" --repo "$GH_REPO" --body-file artifacts/seo-geo-weekly-brief.md
            fi
            if [ -f artifacts/growth-links.md ]; then
              gh issue comment "$EXISTING_ISSUE" --repo "$GH_REPO" --body-file artifacts/growth-links.md
            fi
            exit 0
          fi
          BODY_FILE="$(mktemp)"
          if [ -f artifacts/seo-geo-weekly-brief.md ]; then
            cat artifacts/seo-geo-weekly-brief.md >> "$BODY_FILE"
            printf '\n---\n\n' >> "$BODY_FILE"
          fi
          if [ -f artifacts/growth-links.md ]; then
            cat artifacts/growth-links.md >> "$BODY_FILE"
            printf '\n---\n\n' >> "$BODY_FILE"
          fi
          if [ -f artifacts/seo-geo-content-kit.md ]; then
            cat artifacts/seo-geo-content-kit.md >> "$BODY_FILE"
            printf '\n---\n\n' >> "$BODY_FILE"
          fi
          gh issue create --repo "$GH_REPO" --title "$TITLE" --body-file "$BODY_FILE"
      - name: Upload product acquisition evidence
        uses: actions/upload-artifact@v4
        with:
          name: visioner-growth-performance
          path: |
            docs/visioner-seo-geo-founder-runbook.md
            artifacts/growth-performance.json
            artifacts/growth-performance.md
            artifacts/growth-links.json
            artifacts/growth-links.md
            artifacts/seo-geo-content-kit.json
            artifacts/seo-geo-content-kit.md
            artifacts/seo-live-audit.json
            artifacts/seo-geo-performance.json
            artifacts/seo-geo-weekly-brief.json
            artifacts/seo-geo-weekly-brief.md
          if-no-files-found: warn
          retention-days: 90
